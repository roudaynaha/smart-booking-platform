syntax = "proto3";

package payment;

service PaymentService {
  rpc GetPayment (GetPaymentRequest) returns (PaymentResponse) {}
  rpc Pay (PayRequest) returns (PaymentResponse) {}
}

message GetPaymentRequest {
  string booking_id = 1;
}

message PayRequest {
  string booking_id = 1;
  double amount = 2;
  string payment_method = 3;
}

message PaymentResponse {
  string id = 1;
  string booking_id = 2;
  double amount = 3;
  string status = 4; // SUCCESS, FAILED
}
